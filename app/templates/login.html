{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RACK+ Login</title>
  <link rel="icon" href="{% static 'media/logo.png' %}" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/logincss.css' %}">
  <style>
    body {
        background: url("{% static 'media/teladefundo.png' %}") no-repeat center center fixed;
        background-size: cover;
    }
  </style>
</head>
<body>
  <main class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row w-100 align-items-center justify-content-center">
      
      <!-- Logo -->
      <div class="col-12 col-md-6 col-lg-4 text-center mb-4 mb-md-0 d-flex justify-content-center">
        <a href="../placeholder/">
          <img src="{% static 'media/logo.png' %}" alt="Logo Rack+" id="logo-img" class="img-fluid logo-img">
        </a>
      </div>

      <!-- Formulário -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card p-4">
          <h1 class="text-center mb-4 h3 h-md2">Entrar</h1>
            
            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>

            <label for="password" class="form-label">Senha</label>
            <div class="mb-3 input-group">
              <input type="password" class="form-control" id="password" name="password" required>
              <button class="input-group-text" id="togglePassword" title="Mostrar ou ocultar senha" style="cursor: pointer;" onclick="togglePassword()">
                <i class="bi bi-eye-slash" id="eyeIcon"></i>
              </button>
            </div>

            <button type="button" class="btn btn-custom w-100" id="btn-login" onclick= fazer_login()>Entrar</button>
            <p id="mensagem"></p>

            <div class="text-center mt-3">
              <a href="../cadastro/">Não possui uma conta? Cadastre-se!</a>
            </div>

            <div class="text-center mt-3">
              <a href="../placeholder/">Esqueceu sua senha?</a>
            </div>
        </div>
      </div>

    </div>
  </main>
  <script src="{% static 'js/loginjs.js' %}"></script>
</body>
</html>
