{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RACK+ | Excluir rack</title>
    <link rel="icon" href="{% static 'media/logo.png' %}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background: url("{% static 'media/teladefundo.png' %}") no-repeat center center fixed;
            background-size: cover;
        }

        .page-card {
            background: rgba(250, 252, 255, 0.95);
            border-radius: 28px;
            border: 1px solid rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(6px);
        }
    </style>
</head>
<body>
    <main class="container py-4 py-md-5">
        <div class="page-card shadow p-4 p-md-5 mx-auto" style="max-width: 680px;">
            <a href="{% url 'racks_da_sala' sala.id %}" class="btn btn-outline-secondary btn-sm mb-3">Voltar para racks</a>
            <h1 class="mb-2">Excluir rack</h1>
            <p class="text-muted">Você está prestes a excluir o rack <strong>{{ rack.identificador }}</strong> da sala <strong>{{ sala.nome }}</strong>.</p>
            <div class="alert alert-warning mb-4">
                Ao confirmar, os notebooks vinculados à este rack tambem serão removidos.
            </div>
            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Confirmar exclusão</button>
                <a href="{% url 'racks_da_sala' sala.id %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </main>
</body>
</html>
